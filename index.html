<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jeni!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-love: #ff4d6d;
            --soft-pink: #fff0f3;
            --dark-love: #800f2f;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--soft-pink);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            position: relative;
            z-index: 1;
        }

        h1 {
            color: var(--primary-love);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .heart {
            color: var(--primary-love);
            font-size: 50px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .btn {
            background-color: var(--primary-love);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 20px;
            font-style: italic;
            color: var(--dark-love);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Happy Birthday, Jeni!</h1>
        <p>To the woman who holds my heart, I wish you a day as beautiful and radiant as your smile.</p>
        <p>Today is all about you, my love. Let's celebrate the amazing person you are!</p>
        
        <button class="btn" onclick="celebrate()">Click for a Surprise</button>
        
        <div class="footer-note">Forever Yours ❤️</div>
    </div>

    <script>
        // Automatic confetti on load
        window.onload = () => {
            celebrate();
        };

        function celebrate() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d', '#ff758f', '#c9184a']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d', '#ff758f', '#c9184a']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
