<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jeni ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  overflow: hidden;
}

/* Center content */
.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  padding: 20px;
}

/* Title */
h1 {
  font-size: 2.5rem;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff4d6d; }
}

/* Message */
p {
  font-size: 1.2rem;
  margin-top: 20px;
}

/* Heart animation */
.heart {
  font-size: 2rem;
  animation: heartbeat 1s infinite;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.2); }
  50% { transform: scale(1); }
  75% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Button */
button {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  font-size: 1rem;
  cursor: pointer;
}

button:hover {
  background: #ff1e4d;
}

/* Confetti */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎂 Happy Birthday Jeni ❤️</h1>

  <p>
    My Love 💕,<br><br>
    You are the most beautiful part of my life.<br>
    Every moment with you feels magical ✨<br><br>
    I wish you endless happiness, love, and smiles today and always.<br><br>
    I love you forever 💖
  </p>

  <div class="heart">❤️</div>

  <button onclick="startConfetti()">Celebrate 🎉</button>
</div>

<script>
// Confetti animation
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function randomColor() {
  const colors = ['#ff4d6d', '#ffffff', '#ffd700', '#ff69b4'];
  return colors[Math.floor(Math.random() * colors.length)];
}

function createConfetti() {
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 8 + 2,
      speed: Math.random() * 3 + 2,
      color: randomColor()
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });

  updateConfetti();
}

function updateConfetti() {
  pieces.forEach(p => {
    p.y += p.speed;

    if (p.y > canvas.height) {
      p.y = -10;
    }
  });
}

function startConfetti() {
  createConfetti();
  setInterval(drawConfetti, 20);
}

// Responsive canvas
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
